<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Image</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><text y=%2214%22 font-size=%2216%22>🌿</text></svg>">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
   <nav class="navbar">
        <a href="index.html" class="nav-home"> Home</a>
    </nav>

  <div class="container">
    <h2>Upload Leaf Image</h2>

    <form id="uploadForm">
        <div class="upload-buttons">
            <label for="galleryFile" class="custom-upload-btn">📁 Upload</label>
            <input type="file" id="galleryFile" accept="image/*" hidden>

            <label for="cameraFile" class="custom-upload-btn">📷 Camera</label>
            <input type="file" id="cameraFile" accept="image/*" capture="environment" hidden>
        </div>

        <p id="fileStatus">No image selected</p>

        <button type="submit" class="predict-btn">Predict</button>
    </form>
</div>
    <script src="upload.js"></script>
</body>
</html>
