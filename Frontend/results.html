<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prediction Result</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><text y=%2214%22 font-size=%2216%22>🌿</text></svg>">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
   <nav class="navbar">
        <a href="index.html" class="nav-home">Home</a>
   </nav>
  
    <div class="result-box">
        <h2>🌱 Prediction Result</h2>

        <p><strong>Status:</strong> <span id="status"></span></p>
        <p><strong>Condition:</strong> <span id="disease"></span></p>
        <p><strong>Confidence:</strong> <span id="accuracy"></span>%</p>

        <button onclick="window.location.href='upload.html'">Try Another</button>
    </div>


    <script>
        document.getElementById("status").textContent = localStorage.getItem("status") || "-";
        document.getElementById("disease").textContent = localStorage.getItem("disease") || "-";

        const acc = localStorage.getItem("accuracy");

        document.getElementById("accuracy").textContent =
            acc && !isNaN(acc) ? parseFloat(acc).toFixed(2) : "0.00";
    </script>
</body>
</html>
